services:
  mongodb:
    image: mongo:7
    container_name: vortex_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - vortex

  redis:
    image: redis:7-alpine
    container_name: vortex_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass 1433223qQ
    volumes:
      - redis_data:/data
    networks:
      - vortex

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vortex_backend
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - ./workflows:/app/workflows
      - ./logs:/app/logs
    environment:
      - GIN_MODE=release
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vortex
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/v1/stats"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./ops
      dockerfile: Dockerfile.frontend
    container_name: vortex_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - vortex

volumes:
  mongodb_data:
  redis_data:

networks:
  vortex:
    driver: bridge
